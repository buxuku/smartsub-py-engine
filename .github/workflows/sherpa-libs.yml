name: sherpa-libs

# 把 sherpa-onnx-node 的各平台原生库重打包为 release 资产，供主仓 SmartSub
# 按需下载到 userData（不再依赖 Python sidecar 运行 FunASR）。
on:
  workflow_dispatch:
    inputs:
      sherpaVersion:
        description: 'sherpa-onnx-node version'
        required: true
        default: '1.13.2'

jobs:
  # 各平台只下载 npm 平台子包并重打包（npm pack 跨平台、无需编译器），
  # 产物上传为 artifact，统一交给 publish 一次性发布，避免多 job 并发抢建同一 release。
  pack:
    strategy:
      fail-fast: false
      matrix:
        platformKey:
          - darwin-arm64
          - darwin-x64
          - win-x64
          - win-ia32
          - linux-x64
          - linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/pack_sherpa_libs.mjs ${{ matrix.platformKey }} ${{ inputs.sherpaVersion }} ./out
      - uses: actions/upload-artifact@v4
        with:
          name: sherpa-${{ matrix.platformKey }}
          path: |
            ./out/smartsub-sherpa-onnx-${{ matrix.platformKey }}-${{ inputs.sherpaVersion }}.tar.gz
            ./out/smartsub-sherpa-onnx-${{ matrix.platformKey }}-${{ inputs.sherpaVersion }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    needs: pack
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Reset release (delete + recreate so assets always update)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete sherpa-libs-latest --yes --cleanup-tag --repo ${{ github.repository }} || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: sherpa-libs-latest
          name: sherpa-libs
          body: |
            sherpa-onnx-node 各平台原生运行库（sherpa-onnx.node + onnxruntime/sherpa dylib/so/dll）。
            SmartSub 按需下载到 userData/sherpa-onnx/current，用于 FunASR(sherpa) 转写。
          files: artifacts/*
